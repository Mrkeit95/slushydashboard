<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slushy Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#110A0A;--s1:rgba(255,255,255,0.025);--s2:rgba(255,255,255,0.04);--b1:rgba(255,255,255,0.05);--b2:rgba(255,255,255,0.08);--t:#F0E6E0;--m:#8899AA;--d:#6B7A8A;--f:#4A5568;--pk:#FF3CAC;--or:#FF6B35;--mg:#E91E8C;--gn:#00E59B;--tl:#4ECDC4;--am:#FFB347;--rd:#FF3B5C;--pu:#A78BFA;--bl:#60A5FA;--ro:#F472B6;--ff:'Outfit',sans-serif;--mn:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--t);font-family:var(--ff);min-height:100vh}
.glow{position:fixed;inset:0;background:radial-gradient(ellipse at 15% 0%,rgba(255,60,172,0.05) 0%,transparent 50%),radial-gradient(ellipse at 85% 100%,rgba(255,107,53,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
#loginScreen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column}
.login-box{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:40px;width:380px;max-width:90vw;text-align:center}
.login-box h2{font-size:22px;margin-bottom:6px;background:linear-gradient(135deg,var(--or),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box p{font-size:12px;color:var(--d);margin-bottom:24px}
.li{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:12px 16px;color:var(--t);font-family:var(--ff);font-size:14px;outline:none;margin-bottom:12px;text-align:center}.li:focus{border-color:var(--pk)}.li::placeholder{color:var(--f)}
.lb{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--or),var(--pk));color:#fff;font-family:var(--ff);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}.lb:hover{filter:brightness(1.1)}
.le{color:var(--rd);font-size:12px;margin-top:8px;min-height:18px}
.wrap{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 28px 40px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--b1);flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-t{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--or),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hr{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.up{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);font-size:12px}
.un{font-weight:600}.ur{font-size:9px;color:var(--d);text-transform:uppercase;letter-spacing:1px}
.lo{background:none;border:1px solid var(--b2);border-radius:8px;color:var(--d);font-size:11px;padding:5px 12px;cursor:pointer;font-family:var(--ff)}.lo:hover{color:var(--rd);border-color:var(--rd)}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,0.03);border-radius:10px;padding:3px;flex-wrap:wrap}
.tb{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--ff);background:transparent;color:var(--d);transition:all .2s;white-space:nowrap;position:relative}
.tb.on{background:linear-gradient(135deg,var(--or),var(--pk));color:#fff}.tb:hover:not(.on){color:var(--t)}
.tb .nf{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--rd);color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ld{width:8px;height:8px;border-radius:50%;background:var(--gn);display:inline-block;animation:pls 2s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px}
.lbl{font-size:10px;font-weight:600;color:var(--d);letter-spacing:1.5px;text-transform:uppercase}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px}
.kpi{padding:16px 18px;cursor:pointer;transition:border-color .2s}.kpi:hover{border-color:var(--b2)}
.kv{font-size:22px;font-weight:700;font-family:var(--mn);margin-top:5px;line-height:1}.ks{font-size:10px;color:var(--d);margin-top:5px}
.tw{overflow-x:auto;border-radius:14px;border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:9px 8px;text-align:left;font-size:9px;font-weight:600;color:var(--d);letter-spacing:1px;text-transform:uppercase;background:rgba(255,255,255,0.015);white-space:nowrap;user-select:none}
th.s{cursor:pointer}th.s:hover{color:var(--t)}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.03);transition:background .15s;cursor:pointer}
tbody tr:hover{background:rgba(255,255,255,0.02)}
td{padding:9px 8px;white-space:nowrap}
.badge{padding:3px 7px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.5px;white-space:nowrap;display:inline-block}
.b-star{background:rgba(0,229,155,0.1);border:1px solid rgba(0,229,155,0.2);color:var(--gn)}
.b-solid{background:rgba(78,205,196,0.1);border:1px solid rgba(78,205,196,0.2);color:var(--tl)}
.b-watch{background:rgba(255,179,71,0.1);border:1px solid rgba(255,179,71,0.2);color:var(--am)}
.b-critical{background:rgba(255,59,92,0.1);border:1px solid rgba(255,59,92,0.2);color:var(--rd)}
.ab{padding:3px 7px;border-radius:5px;font-size:9px;font-weight:600;white-space:nowrap;display:inline-block}
.fsel{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:5px 10px;color:var(--t);font-size:11px;font-family:var(--ff);cursor:pointer;outline:none}.fsel option{background:#1a1010}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.g2{grid-template-columns:1fr!important}.kg{grid-template-columns:repeat(2,1fr)}}
.tc{display:none;padding-top:24px}.tc.on{display:block}
/* Panel */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}.ov.open{opacity:1;pointer-events:all}
.pnl{position:fixed;top:0;right:-640px;width:640px;max-width:100vw;height:100vh;background:#1a0f0f;border-left:1px solid var(--b2);z-index:101;transition:right .3s ease;overflow-y:auto}.pnl.open{right:0}
.ph{position:sticky;top:0;z-index:5;background:#1a0f0f;padding:18px 24px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.px{background:none;border:1px solid var(--b2);border-radius:8px;color:var(--m);font-size:18px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center}.px:hover{background:var(--s2);color:var(--t)}
.pb{padding:24px}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ps{padding:12px;border-radius:10px;background:var(--s1);border:1px solid var(--b1)}.ps .dl{font-size:9px;color:var(--d);margin-bottom:2px}.ps .dv{font-size:14px;font-weight:700;font-family:var(--mn)}
.abtn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-family:var(--ff);font-size:12px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}.abtn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.a-fire{background:rgba(255,59,92,0.15);color:var(--rd);border:1px solid rgba(255,59,92,0.3)}
.a-replace{background:rgba(255,60,172,0.15);color:var(--pk);border:1px solid rgba(255,60,172,0.3)}
.a-coach{background:rgba(78,205,196,0.15);color:var(--tl);border:1px solid rgba(78,205,196,0.3)}
.a-note{background:rgba(255,179,71,0.15);color:var(--am);border:1px solid rgba(255,179,71,0.3)}
.a-move{background:rgba(0,229,155,0.15);color:var(--gn);border:1px solid rgba(0,229,155,0.3)}
.na{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--t);font-family:var(--ff);font-size:12px;padding:12px;resize:vertical;min-height:70px;outline:none;margin-top:8px}.na:focus{border-color:var(--pk)}
.ns{margin-top:8px;padding:7px 14px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t);font-size:11px;font-weight:600;font-family:var(--ff);cursor:pointer}.ns:hover{background:var(--pk);border-color:var(--pk);color:#fff}
.si{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600}
.si-p{background:rgba(255,179,71,0.1);color:var(--am)}.si-a{background:rgba(0,229,155,0.1);color:var(--gn)}.si-r{background:rgba(255,59,92,0.1);color:var(--rd)}
.tc-c{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.tst{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;font-family:var(--ff);animation:sli .3s ease,fdo .3s ease 2.7s;opacity:0;animation-fill-mode:forwards}
@keyframes sli{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fdo{to{opacity:0}}
.tst-ok{background:rgba(0,229,155,0.15);border:1px solid rgba(0,229,155,0.3);color:var(--gn)}
.heatcell{padding:5px 3px;text-align:center;font-size:9px;font-family:var(--mn)}
.cc{padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}.cc:hover{border-color:var(--b2);transform:translateY(-2px)}
.sd{width:10px;height:10px;border-radius:50%;display:inline-block;border:2px solid}.sc{border-color:var(--gn);background:var(--gn)}.sg{border-color:var(--rd);background:transparent}
.del-btn{background:none;border:none;color:var(--f);font-size:14px;cursor:pointer;padding:4px;border-radius:4px;opacity:0;transition:all .2s}.del-btn:hover{color:var(--rd)}.saved-note:hover .del-btn,.task-card:hover .del-btn{opacity:1}
.alert-bar{padding:12px 20px;border-radius:12px;margin-top:12px;display:flex;align-items:center;gap:12px;cursor:pointer}.alert-bar:hover{transform:translateY(-1px)}
.ap{width:10px;height:10px;border-radius:50%;flex-shrink:0;animation:pls 1.5s infinite}
.task-card{padding:14px 18px;border-radius:12px;background:var(--s1);border:1px solid var(--b1);margin-bottom:10px}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--b2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}.task-check.checked{background:var(--gn);border-color:var(--gn)}.task-check:hover{border-color:var(--pk)}
</style>
</head>
<body>
<div id="loginScreen"><div class="glow"></div>
<div style="margin-bottom:24px;text-align:center"><svg width="50" height="50" viewBox="0 0 100 100" fill="none"><defs><linearGradient id="slg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="50%" stop-color="#FF3CAC"/><stop offset="100%" stop-color="#E91E8C"/></linearGradient></defs><path d="M50 5 L61 35 L95 35 L68 55 L78 90 L50 70 L22 90 L32 55 L5 35 L39 35 Z" fill="url(#slg)"/><path d="M38 48 Q50 38 62 48 Q62 62 50 70 Q38 62 38 48Z" fill="#110A0A"/></svg></div>
<div class="login-box" id="loginForm"><h2>Slushy Dashboard</h2><p>Operations Command Center</p><input class="li" id="lN" placeholder="Name" onkeydown="if(event.key==='Enter')doLogin()"><input class="li" id="lP" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"><button class="lb" onclick="doLogin()">Sign In</button><div class="le" id="lE"></div></div></div>

<div id="app" style="display:none"><div class="glow"></div><div class="wrap">
<div class="hdr"><div class="logo"><svg width="30" height="30" viewBox="0 0 100 100" fill="none"><defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="50%" stop-color="#FF3CAC"/><stop offset="100%" stop-color="#E91E8C"/></linearGradient></defs><path d="M50 5 L61 35 L95 35 L68 55 L78 90 L50 70 L22 90 L32 55 L5 35 L39 35 Z" fill="url(#sg)"/><path d="M38 48 Q50 38 62 48 Q62 62 50 70 Q38 62 38 48Z" fill="#110A0A"/></svg><span class="logo-t">Slushy Dashboard</span><span id="lS" style="display:flex;align-items:center;gap:6px;margin-left:12px;font-size:10px;color:var(--d)"><span class="ld"></span>Live</span></div><div class="hr"><div class="tabs" id="tbar"></div><div class="up" id="uP"></div><button class="lo" onclick="doLogout()">Sign Out</button></div></div>
<div id="alerts"></div>
<div id="t-overview" class="tc on"></div><div id="t-creators" class="tc"></div><div id="t-chatters" class="tc"></div><div id="t-pricing" class="tc"></div><div id="t-actions" class="tc"></div><div id="t-optimize" class="tc"></div><div id="t-tasks" class="tc"></div><div id="t-heatmap" class="tc"></div><div id="t-settings" class="tc"></div>
</div></div>
<div class="ov" id="ov" onclick="closeP()"></div>
<div class="pnl" id="pnl"><div class="ph"><div id="pT" style="font-weight:700;font-size:16px"></div><button class="px" onclick="closeP()">✕</button></div><div class="pb" id="pB"></div></div>
<div class="tc-c" id="toasts"></div>

<script>
/* Auto-clear old version data */
try{['slushy_actions','slushy_v4','slushy_v5','sv7','st7','su7'].forEach(k=>{
  const v=localStorage.getItem(k);
  if(v&&k!=='slushy_users'&&k!=='sv7'&&k!=='st7'&&k!=='su7')localStorage.removeItem(k);
})}catch(e){}
/* ═══ AUTH + USER DB ═══ */
const DEFAULT_USERS={"keit":{n:"Keit",p:"slushy2026",r:"admin"},"zein":{n:"Zein",p:"slushy2026",r:"admin"},"alex":{n:"Alex",p:"slushy2026",r:"admin"},"corn":{n:"Corn",p:"slushy2026",r:"admin"},"angelica":{n:"Angelica",p:"slushy2026",r:"admin"},"maria":{n:"Maria",p:"manager123",r:"manager"},"juan":{n:"Juan",p:"manager123",r:"manager"},"carlos":{n:"Carlos",p:"manager123",r:"manager"},"diana":{n:"Diana",p:"manager123",r:"manager"},"paolo":{n:"Paolo",p:"manager123",r:"manager"}};
function getUserDB(){try{const d=JSON.parse(localStorage.getItem('slushy_users'));if(d&&Object.keys(d).length>0)return d}catch(e){}localStorage.setItem('slushy_users',JSON.stringify(DEFAULT_USERS));return{...DEFAULT_USERS}}
function saveUserDB(db){localStorage.setItem('slushy_users',JSON.stringify(db))}
let U=null;
var twoFAStep=false;var pendingUser=null;

function doLogin(){
  const db=getUserDB();
  if(twoFAStep&&pendingUser){
    const code=document.getElementById('l2FA').value.trim();
    const u=db[pendingUser];
    if(u&&u.pin&&code===u.pin){U={...u,k:pendingUser};localStorage.setItem('su7',JSON.stringify(U));twoFAStep=false;pendingUser=null;showApp();return}
    document.getElementById('lE').textContent="Invalid 2FA code";return;
  }
  const n=document.getElementById('lN').value.trim().toLowerCase(),p=document.getElementById('lP').value;
  const u=db[n];
  if(!u||u.p!==p){document.getElementById('lE').textContent="Invalid credentials";return}
  if(u.pin){twoFAStep=true;pendingUser=n;document.getElementById('lE').textContent="";document.getElementById('loginForm').innerHTML='<h2 style="font-size:22px;margin-bottom:6px;background:linear-gradient(135deg,var(--or),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent">2FA Verification</h2><p style="font-size:12px;color:var(--d);margin-bottom:24px">Enter your 6-digit security PIN</p><input class="li" id="l2FA" placeholder="000000" maxlength="6" style="letter-spacing:8px;font-size:20px;font-family:var(--mn)" onkeydown="if(event.key===\'Enter\')doLogin()"><button class="lb" onclick="doLogin()">Verify</button><button style="width:100%;padding:10px;border:1px solid var(--b2);border-radius:10px;background:transparent;color:var(--d);font-family:var(--ff);font-size:12px;cursor:pointer;margin-top:8px" onclick="twoFAStep=false;pendingUser=null;location.reload()">Back to Login</button><div class="le" id="lE"></div>';return}
  U={...u,k:n};localStorage.setItem('su7',JSON.stringify(U));showApp()
}
function doLogout(){U=null;localStorage.removeItem('su7');location.reload()}
function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';document.getElementById('uP').innerHTML=`<span class="un">${U.n}</span><span class="ur">${U.r}</span>`;init()}
function isA(){return U&&U.r==='admin'}

/* Settings functions */
function changePassword(oldP,newP,confirmP){
  if(!U)return;
  const db=getUserDB();const u=db[U.k];
  if(!u){toast('User not found');return}
  if(u.p!==oldP){toast('Wrong current password');return}
  if(newP.length<6){toast('Min 6 characters');return}
  if(newP!==confirmP){toast('Passwords dont match');return}
  u.p=newP;db[U.k]=u;saveUserDB(db);U.p=newP;localStorage.setItem('su7',JSON.stringify(U));toast('Password updated');render()
}
function setup2FA(pin){
  if(!U)return;if(pin.length!==6||isNaN(pin)){toast('PIN must be 6 digits');return}
  const db=getUserDB();db[U.k].pin=pin;saveUserDB(db);U.pin=pin;localStorage.setItem('su7',JSON.stringify(U));toast('2FA enabled');render()
}
function disable2FA(){
  if(!U)return;const db=getUserDB();delete db[U.k].pin;saveUserDB(db);delete U.pin;localStorage.setItem('su7',JSON.stringify(U));toast('2FA disabled');render()
}
function addUser(key,name,pass,role){
  if(!isA()){toast('Admin only');return}
  const db=getUserDB();key=key.toLowerCase().trim();
  if(!key||!name||!pass){toast('Fill all fields');return}
  if(key.length<2){toast('Username too short');return}
  if(pass.length<6){toast('Password min 6 chars');return}
  if(db[key]){toast('User already exists');return}
  db[key]={n:name.trim(),p:pass,r:role||'manager'};saveUserDB(db);toast(name+' added');render()
}
function removeUser(key){
  if(!isA()){toast('Admin only');return}
  if(key===U.k){toast('Cannot remove yourself');return}
  const db=getUserDB();if(!db[key]){toast('User not found');return}
  const name=db[key].n;delete db[key];saveUserDB(db);toast(name+' removed');render()
}
function changeUserRole(key,newRole){
  if(!isA()){toast('Admin only');return}
  if(key===U.k){toast('Cannot change own role');return}
  const db=getUserDB();if(!db[key])return;db[key].r=newRole;saveUserDB(db);toast(db[key].n+' → '+newRole);render()
}
function resetUserPassword(key,newPass){
  if(!isA()){toast('Admin only');return}
  if(newPass.length<6){toast('Min 6 chars');return}
  const db=getUserDB();if(!db[key])return;db[key].p=newPass;saveUserDB(db);toast('Password reset for '+db[key].n);render()
}
function resetUser2FA(key){
  if(!isA()){toast('Admin only');return}
  const db=getUserDB();if(!db[key])return;delete db[key].pin;saveUserDB(db);toast('2FA removed for '+db[key].n);render()
}

function enrich(){D.forEach(c=>{c.avgTicket=c.sales>0?c.tot/c.sales:0;c.dailyAvg=c.tot/(c.st==="PTO"?10:26);c.momentum=c.f14>0?c.l15/c.f14:0;c.pctGoal=c.goal>0?(c.tot/c.goal*100):0})}

function getTier(c){if(c.st==="PTO")return"watch";const mx=Math.max(...D.filter(x=>x.st==="Active").map(x=>x.tot));const s=(c.tot/mx)*30+(c.dailyAvg/400)*20+(Math.min(c.momentum,2)/2)*15+((c.daily||[]).filter(v=>v>0).length/6)*10+(c.avgTicket/70)*25;return s>=65?"star":s>=45?"solid":s>=28?"watch":"critical"}

function gS(){try{return JSON.parse(localStorage.getItem('sv7')||'{}')}catch(e){return{}}}
function sS(d){localStorage.setItem('sv7',JSON.stringify(d))}
function gCS(id){return gS()[id]||{notes:[],actions:[],status:null}}
function saveNote(id,text){const s=gS();if(!s[id])s[id]={notes:[],actions:[],status:null};s[id].notes.unshift({text,time:new Date().toLocaleString(),by:U.n,id:Date.now()});sS(s);toast("Note saved");openCh(id)}
function delNote(cid,nid){if(!isA()){toast("Admin only");return}const s=gS();if(s[cid])s[cid].notes=s[cid].notes.filter(n=>n.id!==nid);sS(s);openCh(cid)}
function saveActn(id,a,d){const s=gS();if(!s[id])s[id]={notes:[],actions:[],status:null};s[id].actions.unshift({a,d,time:new Date().toLocaleString(),by:U.n});s[id].status=a;sS(s);toast(a);openCh(id);render()}
function gT(){try{return JSON.parse(localStorage.getItem('st7')||'[]')}catch(e){return[]}}

function addTask(text,pri,cid){const t=gT();t.unshift({id:Date.now(),text,pri,cid:cid||0,done:false,created:new Date().toLocaleString(),by:U.n,updates:[]});sT(t);render()}
function togTask(id){const t=gT();const tk=t.find(x=>x.id===id);if(tk)tk.done=!tk.done;sT(t);render()}
function delTask(id){if(!isA()){toast("Admin only");return}sT(gT().filter(x=>x.id!==id));render()}
function addTU(id,text){const t=gT();const tk=t.find(x=>x.id===id);if(tk)tk.updates.unshift({text,time:new Date().toLocaleString(),by:U.n});sT(t);render()}

function openDay(dayNum){
  const dayData=MD.find(d=>d.d===dayNum);

  const totalCount=rankings.reduce((s,r)=>s+r.count,0);

  const teamSales={};

  document.getElementById('ov').classList.add('open');document.getElementById('pnl').classList.add('open');

          {l:"Avg per Sale",v:totalCount?fmt(totalSales/totalCount):'—'},
          {l:"vs Goal",v:totalSales>=ME.dg?'+'+fmt(totalSales-ME.dg):'-'+fmt(ME.dg-totalSales),cl:totalSales>=ME.dg?'var(--gn)':'var(--rd)'}

function openTeam(team){
  const creators=CR.filter(c=>c.t===team);
  const chatters=D.filter(c=>c.st==="Active"&&c.team===team);
  const teamGoal=TEAM_GOALS[team]||0;
  const chatterSales=chatters.reduce((s,c)=>s+c.tot,0);
  const shifts={Morning:[],Day:[],Night:[],"Filler-4x":[],"Filler-2x":[]};
  chatters.forEach(c=>{if(shifts[c.shift])shifts[c.shift].push(c)});
  const gaps=["Morning","Day","Night"].filter(sh=>!chatters.some(c=>c.shift===sh));
  const topCreators=creators.sort((a,b)=>b.g-a.g).slice(0,10);

  document.getElementById('ov').classList.add('open');document.getElementById('pnl').classList.add('open');
  document.getElementById('pT').innerHTML=`<span style="color:${TC[team]}">${team}</span> · ${creators.length} creators · ${chatters.length} chatters`;
  document.getElementById('pB').innerHTML=`
    <div style="margin-bottom:20px"><div class="pg">
      ${[{l:"Total Creator Goals",v:fK(teamGoal)},{l:"Chatter Sales (March)",v:fmt(chatterSales)},{l:"Creators",v:creators.length},{l:"Chatters",v:chatters.length},{l:"Shift Gaps",v:gaps.length?gaps.join(', '):'None',cl:gaps.length?'var(--rd)':'var(--gn)'}].map(x=>`<div class="ps"><div class="dl">${x.l}</div><div class="dv"${x.cl?' style="color:'+x.cl+'"':''}>${x.v}</div></div>`).join('')}
    </div></div>
    <div style="margin-bottom:20px"><div class="lbl" style="margin-bottom:8px">Shift Coverage</div>
      ${["Morning","Day","Night","Filler-4x","Filler-2x"].map(sh=>{const ch=shifts[sh]||[];if(!ch.length&&!["Morning","Day","Night"].includes(sh))return'';return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:5px;background:${ch.length?'var(--s1)':'rgba(255,59,92,0.06)'};border:1px solid ${ch.length?'var(--b1)':'rgba(255,59,92,0.15)'}"><span class="sd ${ch.length?'sc':'sg'}"></span><span style="font-size:12px;font-weight:600;width:70px">${sh}</span><div style="flex:1">${ch.length?ch.map(c=>`<span style="cursor:pointer;margin-right:8px;font-size:11px" onclick="event.stopPropagation();openCh(${c.id})">${tb(getTier(c))} <strong>${c.n}</strong> <span style="color:var(--d)">${fmt(c.avgTicket)} avg</span></span>`).join(''):'<span style="color:var(--rd);font-size:11px;font-weight:600">⚠ NO COVERAGE</span>'}</div></div>`}).join('')}
    </div>
    <div style="margin-bottom:20px"><div class="lbl" style="margin-bottom:8px">Top Creators (by goal)</div><div class="tw"><table><thead><tr><th>Creator</th><th>Monthly Goal</th></tr></thead><tbody>
      ${topCreators.map(c=>`<tr><td style="font-weight:600;color:${TC[team]}">${c.n}</td><td style="font-family:var(--mn)">${fmt(c.g)}</td></tr>`).join('')}
      ${creators.length>10?`<tr><td colspan="2" style="color:var(--d);font-size:11px">+ ${creators.length-10} more creators</td></tr>`:''}
    </tbody></table></div></div>
    <div style="margin-bottom:20px"><div class="lbl" style="margin-bottom:8px">Chatters</div><div class="tw"><table><thead><tr><th>Chatter</th><th>Shift</th><th>March $</th><th>Ticket</th><th>Goal</th><th>Tier</th></tr></thead><tbody>
      ${chatters.sort((a,b)=>b.tot-a.tot).map(c=>`<tr onclick="openCh(${c.id})"><td style="font-weight:600">${c.n}</td><td style="font-size:11px;color:var(--m)">${c.shift}</td><td style="font-family:var(--mn);font-weight:700">${fmt(c.tot)}</td><td style="font-family:var(--mn);color:${c.avgTicket>=35?'var(--gn)':c.avgTicket<25?'var(--rd)':''}">${fmt(c.avgTicket)}</td><td style="font-family:var(--mn);font-size:11px">${fmt(c.goal)}</td><td>${tb(getTier(c))}</td></tr>`).join('')}
    </tbody></table></div></div>
    ${gaps.length?`<div style="padding:12px;border-radius:10px;border-left:3px solid var(--rd);background:rgba(255,59,92,0.06);font-size:12px;color:var(--m)">⚠ <strong>${gaps.join(', ')}</strong> shift${gaps.length>1?'s':''} uncovered = revenue gap. Assign a chatter ASAP.</div>`:''} 
  `;
}

/* ═══ RENDER ═══ */
function render(){
  const active=D.filter(c=>c.st==="Active");const tiers={star:0,solid:0,watch:0,critical:0};D.forEach(c=>tiers[getTier(c)]++);
  const avgT=active.reduce((s,c)=>s+c.avgTicket,0)/active.length;
  const byTk=[...active].sort((a,b)=>b.avgTicket-a.avgTicket);
  const recovery=active.filter(c=>c.avgTicket<30).reduce((s,c)=>(35-c.avgTicket)*c.sales*0.5,0);
  const store=gS();const tasks=gT();const pending=tasks.filter(t=>!t.done);

  // Alerts
  const al=[];
  if(pending.filter(t=>t.pri==='urgent').length)al.push({text:`${pending.filter(t=>t.pri==='urgent').length} urgent tasks`,c:'var(--rd)',tab:'tasks'});
  if(D.filter(c=>getAct(c).u<=1).length)al.push({text:`${D.filter(c=>getAct(c).u<=1).length} chatters flagged for termination`,c:'var(--or)',tab:'actions'});
  // Team 5 night gap
  if(!D.some(c=>c.team==="Team 5"&&c.shift==="Night"&&c.st==="Active"))al.push({text:'Team 5 has NO night shift coverage',c:'var(--rd)',tab:'creators'});
  document.getElementById('alerts').innerHTML=al.map(a=>`<div class="alert-bar" style="background:${a.c}08;border:1px solid ${a.c}20" onclick="switchTab('${a.tab}')"><span class="ap" style="background:${a.c}"></span><span style="font-size:13px;font-weight:600;color:${a.c}">${a.text}</span><span style="font-size:11px;color:var(--d);margin-left:auto">→</span></div>`).join('');

  document.getElementById('tbar').innerHTML=TABS.map(t=>`<button class="tb${tab===t.id?' on':''}" onclick="switchTab('${t.id}')">${t.l}${t.id==='tasks'&&pending.length?`<span class="nf">${pending.length}</span>`:''}</button>`).join('');

  // Team summaries
  const teams=["Team 1","Team 2","Team 3","Team 4","Team 5","Team 6","Team 7"].map(t=>{
    const cr=CR.filter(c=>c.t===t);const ch=D.filter(c=>c.st==="Active"&&c.team===t);
    const goal=TEAM_GOALS[t]||0;const sales=ch.reduce((s,c)=>s+c.tot,0);
    const gaps=["Morning","Day","Night"].filter(sh=>!ch.some(c=>c.shift===sh));
    return{team:t,creators:cr.length,chatters:ch.length,goal,sales,gaps,chatterList:ch};
  });

const SHEET_BASE='/api/sheet?sid=slushy&sheet=';
var lastSync=null;var syncStatus='connecting';

function parseCSV(text){
  const rows=[];let current='';let inQ=false;let row=[];
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(ch==='"'){inQ=!inQ}
    else if(ch===','&&!inQ){row.push(current.trim().replace(/^"|"$/g,''));current=''}
    else if((ch==='\n'||ch==='\r')&&!inQ){
      if(current.length||row.length){row.push(current.trim().replace(/^"|"$/g,''));rows.push(row);row=[];current=''}
    }else{current+=ch}
  }
  if(current.length||row.length){row.push(current.trim().replace(/^"|"$/g,''));rows.push(row)}
  return rows;
}

function parseNum(s){return parseFloat((s||'0').replace(/[$,"%]/g,''))||0}

async function syncChatterData(){
  try{
    const url=SHEET_BASE+encodeURIComponent('Chatter Net Sales (Payroll)');
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const csv=await resp.text();
    const rows=parseCSV(csv);
    
    // Find header row
    let hdr=-1;
    for(let i=0;i<Math.min(rows.length,10);i++){
      if(rows[i].some(c=>c.includes('Chatter Name'))){hdr=i;break}
    }
    if(hdr<0)return false;
    
    const h=rows[hdr];
    const col=(name)=>h.findIndex(c=>c.includes(name));
    const iName=col('Chatter Name'),iStatus=col('Status'),iTeam=col('Team');
    const iShift=col('Shift');
    const i14=col('1 to 14'),i15=col('15 to End'),iTot=col('Total Month');
    const iGoal=col('Goal')>=0?col('Goal'):col('Target');
    const iSales=col('Sale Count')>=0?col('Sale Count'):col('Sales');
    
    if(iName<0||iTot<0)return false;
    
    // Build fresh data from sheet, preserving daily arrays from old D
    const oldMap={};
    D.forEach(c=>{oldMap[c.n]=c});
    
    const freshD=[];
    let id=1;
    for(let i=hdr+1;i<rows.length;i++){
      const r=rows[i];const name=(r[iName]||'').trim();
      if(!name||name.length<2)continue;
      const tot=parseNum(r[iTot]);
      const old=oldMap[name]||{};
      freshD.push({
        id:id++,
        n:name,
        st:iStatus>=0&&r[iStatus]?r[iStatus].trim():(old.st||'Active'),
        team:iTeam>=0&&r[iTeam]?r[iTeam].trim():(old.team||''),
        shift:iShift>=0&&r[iShift]?r[iShift].trim():(old.shift||''),
        goal:iGoal>=0?parseNum(r[iGoal]):(old.goal||0),
        f14:i14>=0?parseNum(r[i14]):(old.f14||0),
        l15:i15>=0?parseNum(r[i15]):(old.l15||0),
        tot:tot,
        sales:iSales>=0?parseInt(r[iSales])||0:(old.sales||0),
        daily:old.daily||[]
      });
    }
    
    if(freshD.length>=5){
      D.length=0;
      freshD.forEach(c=>D.push(c));
      enrich();
      console.log('[Slushy] Full sync: '+D.length+' chatters from sheet');
      return true;
    }
    return false;
  }catch(e){console.log('Chatter sync error:',e.message);return false}
}

async function syncDashboardData(){
  try{
    const url=SHEET_BASE+encodeURIComponent('Slushy Dashboard');
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const csv=await resp.text();
    const rows=parseCSV(csv);
    
    // Look for key values in the data
    for(let i=0;i<rows.length;i++){
      const r=rows[i];
      for(let j=0;j<r.length;j++){
        const v=r[j];
        // March Running Sales (look for the big number near "March Running")
        if(j>0&&r[j-1]&&r[j-1].includes('March Running')){ME.mr=parseNum(v)||ME.mr}
        // Monthly Goal
        if(v.includes('Monthly Goal')&&rows[i+1]){ME.mg=parseNum(rows[i+1][j])||ME.mg}
        // Monthly Proj
        if(v.includes('Monthly Proj')&&rows[i+1]){ME.mp=parseNum(rows[i+1][j])||ME.mp}
        // Daily Goal
        if(v.includes('Daily Goal')&&rows[i+1]){ME.dg=parseNum(rows[i+1][j])||ME.dg}
        // Total Sale Count
        if(v.includes('Total Sale Count')&&rows[i+1]){ME.sc=parseNum(rows[i+1][j])||ME.sc}
      }
    }
    
    // Find today/yesterday values
    // Look for "Today" row with a dollar amount
    for(let i=0;i<rows.length;i++){
      for(let j=0;j<rows[i].length;j++){
        const v=rows[i][j];
        if(v&&v.includes('Today')&&rows[i][j+1]){
          const val=parseNum(rows[i][j+1]);
          if(val>0)ME.td=val;
        }
        if(v&&v.includes('Yesterday')&&rows[i][j+1]){
          const val=parseNum(rows[i][j+1]);
          if(val>0)ME.yd=val;
        }
      }
    }
    
    // Find February Sales
    for(let i=0;i<rows.length;i++){
      const r=rows[i];
      if(r.some(c=>c.includes('February Sales'))){
        for(let j=0;j<r.length;j++){
          const val=parseNum(r[j]);
          if(val>50000){ME.feb=val;break}
        }
      }
    }
    
    // Parse daily heat map data
    // Look for rows starting with "Mar 01", "Mar 02", etc.
    for(let i=0;i<rows.length;i++){
      const r=rows[i];
      if(!r[0])continue;
      const dayMatch=r[0].match(/Mar\s*(\d+)/);
      if(dayMatch){
        const dayNum=parseInt(dayMatch[1]);
        const dayEntry=MD.find(d=>d.d===dayNum);
        if(dayEntry){
          // Update hourly slots
          const slots=[];let dayTotal=0;
          for(let j=1;j<=12&&j<r.length;j++){
            const val=parseNum(r[j]);
            slots.push(val);
            dayTotal+=val;
          }
          if(dayTotal>0){
            dayEntry.h=slots.length===12?slots:dayEntry.h;
            dayEntry.s=dayTotal;
          }
        }else if(dayNum>0&&dayNum<=31){
          // New day not in our data
          const slots=[];let dayTotal=0;
          for(let j=1;j<=12&&j<r.length;j++){
            const val=parseNum(r[j]);
            slots.push(val);dayTotal+=val;
          }
          if(dayTotal>0&&slots.length===12){
            MD.push({d:dayNum,s:dayTotal,h:slots});
            MD.sort((a,b)=>a.d-b.d);
          }
        }
      }
    }
    
    // Recalculate running total from daily data
    const runningFromDaily=MD.reduce((s,d)=>s+d.s,0);
    if(runningFromDaily>50000)ME.mr=runningFromDaily;
    
    // Update projection
    const daysWithData=MD.filter(d=>d.s>0).length;
    if(daysWithData>0)ME.mp=(ME.mr/daysWithData)*31;
    
    return true;
  }catch(e){console.log('Dashboard sync error:',e.message);return false}
}

async function syncChatterRanking(){
  try{
    const url=SHEET_BASE+encodeURIComponent('Slushy Dashboard');
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const csv=await resp.text();
    const rows=parseCSV(csv);
    
    // Find the ranking section (look for "Rank", "Chatter", "Total Sales")
    let rankHdr=-1;
    for(let i=0;i<rows.length;i++){
      if(rows[i].some(c=>c==='Rank')&&rows[i].some(c=>c.includes('Chatter'))&&rows[i].some(c=>c.includes('Total Sales'))){
        rankHdr=i;break;
      }
    }
    if(rankHdr<0)return;
    
    const h2=rows[rankHdr];
    const iRank=h2.findIndex(c=>c==='Rank');
    const iChatter=h2.findIndex(c=>c.includes('Chatter'));
    const iShift=h2.findIndex(c=>c.includes('Shift'));
    const iTeamR=h2.findIndex(c=>c==='Team');
    const iTotalS=h2.findIndex(c=>c.includes('Total Sales'));
    const iCount=h2.findIndex(c=>c.includes('Sale Count'));
    
    const todayRanking=[];
    for(let i=rankHdr+1;i<rows.length;i++){
      const r=rows[i];
      const name=iChatter>=0?r[iChatter]:'';
      const sales=iTotalS>=0?parseNum(r[iTotalS]):0;
      if(!name||name.length<2||sales===0)break;
      todayRanking.push({
        n:name,
        team:iTeamR>=0?r[iTeamR]:'',
        sales:sales,
        count:iCount>=0?parseInt(r[iCount])||1:1
      });
    }
    
    if(todayRanking.length>0){
      // Determine today's day number
      const today=new Date();
      const dayNum=today.getDate();
      DAY_RANKINGS[dayNum]=todayRanking;
      ME.tc=todayRanking.reduce((s,r)=>s+r.count,0);
      ME.td=todayRanking.reduce((s,r)=>s+r.sales,0);
    }
  }catch(e){console.log('Ranking sync error:',e.message)}
}

async function doSync(){
  try{
    const results=await Promise.allSettled([
      syncChatterData(),
      syncDashboardData(),
      syncChatterRanking()
    ]);
    
    const anyOk=results.some(r=>r.status==='fulfilled'&&r.value===true);
    lastSync=new Date();
    syncStatus=anyOk?'live':'partial';
    
    document.getElementById('lS').innerHTML=`<span class="ld" style="background:${anyOk?'var(--gn)':'var(--am)'}"></span>${anyOk?'Live':'Partial'} · ${lastSync.toLocaleTimeString()}`;
    
    if(anyOk)render();
    return anyOk;
  }catch(e){
    syncStatus='offline';
    document.getElementById('lS').innerHTML='<span style="width:8px;height:8px;border-radius:50%;background:var(--rd);display:inline-block"></span> Offline';
    return false;
  }
}

function init(){
const errs=[];
try{
  document.getElementById('t-overview').innerHTML='<div style="padding:20px;color:var(--t)">Loading dashboard... syncing with Google Sheets...</div>';
  document.getElementById('tbar').innerHTML=TABS.map(t=>`<button class="tb${tab===t.id?' on':''}" onclick="switchTab('${t.id}')">${t.l}</button>`).join('');
}catch(e){errs.push('Tab init: '+e.message)}
try{render()}catch(e){
  errs.push('Render: '+e.message+'\n'+e.stack);
  document.getElementById('t-overview').innerHTML='<div style="padding:40px"><h2 style="color:#FF3B5C;margin-bottom:12px">Dashboard Error</h2><pre style="color:#8899AA;white-space:pre-wrap;font-size:13px;line-height:1.6;background:rgba(255,255,255,0.03);padding:20px;border-radius:12px">'+errs.join('\n\n')+'</pre></div>';
}
// Start live sync
doSync();
setInterval(doSync, 60000);
}

const sv=localStorage.getItem('su7');
if(sv){try{U=JSON.parse(sv);showApp()}catch(e){localStorage.removeItem('su7')}}
</script>
